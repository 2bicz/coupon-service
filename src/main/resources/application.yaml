spring:
  application:
    name: coupon-service
  datasource:
    url: jdbc:postgresql://localhost:5432/mydb
    username: user
    password: pass

    jpa:
      hibernate:
        ddl-auto: validate
      properties:
        hibernate:
          format_sql: true
      show-sql: true

    liquibase:
      change-log: classpath:db/changelog/db.changelog-master.yaml