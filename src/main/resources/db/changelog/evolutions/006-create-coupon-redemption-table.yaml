databaseChangeLog:
  - changeSet:
      id: 006-create-coupon-redemption-table
      author: Patryk Tubicz
      changes:
        - createTable:
            tableName: coupon_redemption
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: coupon_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: external_user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: coupon_redemption
            columnNames: coupon_id, external_user_id
            constraintName: uq_coupon_external_user

        - addForeignKeyConstraint:
            baseTableName: coupon_redemption
            baseColumnNames: coupon_id
            referencedTableName: coupon
            referencedColumnNames: id
            constraintName: fk_coupon_redemption_coupon

        - addForeignKeyConstraint:
            baseTableName: coupon_redemption
            baseColumnNames: external_user_id
            referencedTableName: external_user
            referencedColumnNames: id
            constraintName: fk_coupon_redemption_external_user
