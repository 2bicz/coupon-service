databaseChangeLog:
  - changeSet:
      id: 001-create-external-system-table
      author: Patryk Tubicz
      changes:
        - createTable:
            tableName: external_system
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: client_id
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true