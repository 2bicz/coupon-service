databaseChangeLog:
  - changeSet:
      id: 003-create-country-table
      author: Patryk Tubicz
      changes:
        - createTable:
            tableName: country
            remarks: ISO 3166-1 alpha-2 country codes
            columns:
              - column:
                  name: code
                  type: varchar(2)
                  remarks: ISO 3166-1 alpha-2 country code
                  constraints:
                    primaryKey: true
                    nullable: false