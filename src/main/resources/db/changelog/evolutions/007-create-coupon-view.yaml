databaseChangeLog:
  - changeSet:
      id: 008-create-coupon-view
      author: Patryk Tubicz
      changes:
        - createView:
            viewName: coupon_view
            selectQuery: |
              SELECT
                  c.id,
                  c.created_at,
                  c.code,
                  c.usage_limit,
                  COALESCE(r.usage_count, 0) AS usage_count,
                  COALESCE(cc.country_codes, ARRAY[]::TEXT[]) AS country_codes
              FROM coupon c
              LEFT JOIN (
                  SELECT coupon_id, COUNT(*) AS usage_count
                  FROM coupon_redemption
                  GROUP BY coupon_id
              ) r ON r.coupon_id = c.id
              LEFT JOIN (
                  SELECT coupon_id, ARRAY_AGG(country_code) AS country_codes
                  FROM coupon_country
                  GROUP BY coupon_id
              ) cc ON cc.coupon_id = c.id